<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafios das Tags</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso</p>
    <ul>
        <li title="Use a Tag <p>">Parágrafo</li>
        <li title="Use a Tag <h1,2,3... etc>">Titulos</li>
        <li title="Use a Tag <img>">Imagens</li>
        <li title="Use a Tag <abbr>">Abreviações</li>
        <li title="Use a Tag <code>">Código fonte</li>
        <li title="Use a Tag <ol> e <li>">listas numeradas</li>
        <li title="Use a Tag <ul> e <li>">Listas com demarcadores</li>
        <li title="Use a Tag <b>">Negrito</li>
        

    </ul>
    
    
</body>
</html>
