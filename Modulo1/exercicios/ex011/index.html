<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midiers em HTML5</title>
</head>
<body>
    <h1>Imagens dinamicas</h1>
    <p>Tente usar este site em varios dispositivos ou simplesmente altere o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width: 700px)" srcset="Imagens/Foto-P.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="Imagens/Foto-M.png" 
        type="image/png">
        <img src="Imagens/Foto-G.png" alt="Imagem flexivel">
    </picture>
    <h1>Reproduzindo Audio</h1>
    <p>Vamos aprender a reproduzir audio em HTML5</p>
   <audio preload="metadata" autoplay loop controls>
       <source src="midia/Monthaholic - Schwartzy.mp3" type="audio/mpeg">
   </audio>


    <!--
    <audio src="midia/Monthaholic - Schwartzy.mp3" controls autoplay></audio>
    MP3=mpeg WAV=wav OGG=ogg -->
    
</body>
</html>
